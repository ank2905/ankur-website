name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ankur-website .

      - name: Run Docker container
        run: |
          docker run -d --name ankur-site -p 8080:80 ankur-website
